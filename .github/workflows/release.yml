name: Release

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*"

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build app
        run: bash build.sh

      - name: Zip app bundle
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent QRDrop.app QRDrop.zip

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/QRDrop.zip \
            --title "QRDrop ${{ github.ref_name }}" \
            --generate-notes
